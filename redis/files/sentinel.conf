bind 0.0.0.0
port %(sentinel_port)d
# Track masters/replicas/peers by stable StatefulSet FQDN rather than pod IP, so
# that a rolling restart (which changes every pod IP) does not strand Sentinel on
# dead "ghost" addresses. Requires Redis >= 6.2.
# init.sh appends, in order: `sentinel myid`, `sentinel announce-ip <fqdn>`,
# `sentinel monitor <group> <master-fqdn> ...`, and the per-master options
# (down-after/failover-timeout/parallel-syncs/auth-pass). The monitor line MUST
# precede the per-master options, which is why they are appended at runtime
# rather than templated here.
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
